    description: "Construction time of a `{prefix}` plant entering into service"
  - match: "*_plant_lifespan"
    unit: "yr"
    description: "Operational lifespan of a `{prefix}` plant"

  # --- Environmental outputs of the generic energy model ---
  - match: "*_co2_emission_factor_without_resource"
    unit: "gCO2/MJ"
    description: "CO2 emission factor of `{prefix}` excluding resources"
  - match: "*_co2_emission_factor_without_resources"
    unit: "gCO2/MJ"
