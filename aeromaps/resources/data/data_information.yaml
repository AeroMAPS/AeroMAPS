# =============================================================================
# AeroMAPS data information: units, descriptions and sources of variables
# =============================================================================
# This file is the single source of truth for variable metadata. It replaces
# the legacy data_information.csv.
#
# Structure:
#   variables:            exact variable names
#     <variable_name>:
#       unit:             unit string, validated against aeromaps/utils/units.py
#       description:      short human-readable description
#       source:           (optional) reference for the default input value
#   patterns:             ordered glob rules ("*" wildcard) for variables whose
#                         names are generated dynamically (e.g. per energy
#                         pathway); the first matching rule wins, and exact
#                         entries always take precedence over patterns. In
#                         descriptions, "{prefix}" is replaced by the text
#                         matched by the first "*" and "{name}" by the full
#                         variable name.
#
# Units use the vocabulary defined in aeromaps/utils/units.py ("-" stands for
# dimensionless). Run the test suite (test_data_information.py) after editing
# this file: it validates every unit and checks variable coverage.
# =============================================================================

