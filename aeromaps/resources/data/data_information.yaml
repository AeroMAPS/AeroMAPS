    description: "Total CO2 emissions of the `{prefix}` energy pathway"

  # --- Carbon abatement ---
  - match: "*_specific_carbon_abatement_cost*"
    unit: "€/tCO2"
    description: "Specific carbon abatement cost of `{prefix}`"
  - match: "*_carbon_abatement_cost*"
    unit: "€/tCO2"
    description: "Carbon abatement cost of `{prefix}`"
  - match: "*_carbon_abatement_volume*"
