  - match: "*_abatement_effective*"
    unit: "tCO2"
    description: "Effective carbon abatement volume of `{prefix}`"
  - match: "*_abatement_cost*"
    unit: "€/tCO2"
    description: "Carbon abatement cost of `{prefix}`"
  - match: "*_vintage_eis_carbon_tax"
    unit: "€/tCO2"
    description: "Carbon tax at entry into service of the `{prefix}` plants commissioned in the given year"
  - match: "*_carbon_tax"
    unit: "€/tCO2"
    description: "Carbon tax applied to `{prefix}`"

  # --- Energy and resource flows (generic energy model) ---
  - match: "*_energy_consumption"
    unit: "MJ"
    description: "Energy consumption of `{prefix}`"
  - match: "*_mass_consumption"
    unit: "kg"
    description: "Mass of energy carrier consumed by `{prefix}`"
  - match: "*_energy_unused"
    unit: "MJ"
    description: "Energy production of `{prefix}` exceeding the demand"
  - match: "*_energy_production_commissioned"
    unit: "MJ"
    description: "New annual energy production capacity of `{prefix}` commissioned in the given year"
  - match: "*_technology_introduction_volume"
    unit: "MJ"
    description: "Energy volume of `{prefix}` at technology introduction"
  - match: "*_technology_introduction_year"
    unit: "yr"
