  - match: "*_lifespan_unitary_discounted_costs"
    unit: "€/MJ"
    description: "Discounted costs of `{prefix}` cumulated over the plant lifespan, per unit of energy"
  - match: "*_capex_cost"
    unit: "€"
    description: "Annual capital expenditure for building new `{prefix}` plants"

  # --- Entry-into-service (EIS) plant characteristics of the generic energy model ---
  - match: "*_eis_capex"
