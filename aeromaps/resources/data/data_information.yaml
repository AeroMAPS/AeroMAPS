patterns:

  # --- Reference years and values of interpolated inputs ---
  - match: "*_mfsp_without_resource_values"
    unit: "€/MJ"
    description: "Minimum fuel selling price (MFSP) excluding resources of `{prefix}` for the reference years"
  - match: "*_unit_subsidy_without_resource_values"
    unit: "€/MJ"
    description: "Subsidy excluding resources of `{prefix}` for the reference years"
  - match: "*_unit_tax_without_resource_values"
    unit: "€/MJ"
    description: "Tax excluding resources of `{prefix}` for the reference years"
  - match: "*_co2_emission_factor_values"
    unit: "gCO2/MJ"
    description: "CO2 emission factor of `{prefix}` for the reference years"
  - match: "*_co2_emission_factor_without_resource_values"
    unit: "gCO2/MJ"
    description: "CO2 emission factor excluding resources of `{prefix}` for the reference years"
  - match: "*_eis_capex_values"
    unit: "€/(MJ/yr)"
    description: "Capital expenditure per unit of annual production capacity of `{prefix}` plants for the reference years"
  - match: "*_eis_fixed_opex_values"
    unit: "€/(MJ/yr)/yr"
    description: "Annual fixed operational expenditure per unit of annual production capacity of `{prefix}` plants for the reference years"
  - match: "*_eis_variable_opex_values"
    unit: "€/MJ"
    description: "Variable operational expenditure of `{prefix}` plants for the reference years"
  - match: "*_availability_global_values"
    unit: "MJ"
    description: "Global availability of the `{prefix}` resource for the reference years"
  - match: "*_load_factor_values"
    unit: "-"
    description: "Load factor of `{prefix}` for the reference years"
  - match: "*_share_values"
    unit: "%"
    description: "Share `{prefix}` for the reference years"
  - match: "*_cost_values"
    unit: "€/MJ"
    description: "Cost of the `{prefix}` resource for the reference years"
  - match: "*_years"
    unit: "yr"
    description: "Reference years used to interpolate `{prefix}`"
  - match: "*_reference_periods"
    unit: "yr"
    description: "Reference periods used for the leveling of `{prefix}`"

  # --- Techno-economic outputs of the generic energy model (per MJ of energy carrier) ---
  - match: "*_net_mfsp_without_carbon_tax"
    unit: "€/MJ"
    description: "Net minimum fuel selling price (MFSP) of `{prefix}` excluding carbon tax"
  - match: "*_net_mfsp"
    unit: "€/MJ"
    description: "Net minimum fuel selling price (MFSP) of `{prefix}` including taxes, subsidies and carbon tax"
  - match: "*_marginal_mfsp"
    unit: "€/MJ"
    description: "Marginal minimum fuel selling price (MFSP) of `{prefix}`"
  - match: "*_mean_mfsp_without_resource"
    unit: "€/MJ"
    description: "Mean minimum fuel selling price (MFSP) of `{prefix}` excluding resources"
  - match: "*_mean_mfsp"
    unit: "€/MJ"
    description: "Mean minimum fuel selling price (MFSP) of `{prefix}`"
  - match: "*_mean_unit_cost_without_resources"
    unit: "€/MJ"
    description: "Mean unit cost of `{prefix}` excluding resources"
  - match: "*_mean_unit_cost"
    unit: "€/MJ"
    description: "Mean unit cost of `{prefix}`"
  - match: "*_vintage_unit_cost"
    unit: "€/MJ"
    description: "Unit cost of `{prefix}` for the plants commissioned in the given year"
  - match: "*_mean_unit_carbon_tax"
    unit: "€/MJ"
    description: "Mean unit carbon tax paid by `{prefix}`"
  - match: "*_mean_carbon_tax_supplement"
    unit: "€/MJ"
    description: "Mean carbon tax supplement of `{prefix}` with respect to the reference fuel"
  - match: "*_mean_unit_tax_without_resource"
    unit: "€/MJ"
    description: "Mean unit tax of `{prefix}` excluding resources"
  - match: "*_mean_unit_tax_without_resources"
    unit: "€/MJ"
    description: "Mean unit tax of `{prefix}` excluding resources"
  - match: "*_mean_unit_tax"
    unit: "€/MJ"
    description: "Mean unit tax of `{prefix}`"
  - match: "*_mean_unit_subsidy_without_resource"
    unit: "€/MJ"
    description: "Mean unit subsidy of `{prefix}` excluding resources"
  - match: "*_mean_unit_subsidy_without_resources"
    unit: "€/MJ"
    description: "Mean unit subsidy of `{prefix}` excluding resources"
  - match: "*_mean_unit_subsidy"
    unit: "€/MJ"
    description: "Mean unit subsidy of `{prefix}`"
  - match: "*_mean_unit_capex"
    unit: "€/MJ"
    description: "Mean unit capital expenditure of `{prefix}`"
  - match: "*_vintage_unit_capex"
    unit: "€/MJ"
    description: "Unit capital expenditure of `{prefix}` for the plants commissioned in the given year"
  - match: "*_mean_unit_fixed_opex"
    unit: "€/MJ"
    description: "Mean unit fixed operational expenditure of `{prefix}`"
  - match: "*_vintage_unit_fixed_opex"
    unit: "€/MJ"
    description: "Unit fixed operational expenditure of `{prefix}` for the plants commissioned in the given year"
  - match: "*_mean_unit_variable_opex"
    unit: "€/MJ"
    description: "Mean unit variable operational expenditure of `{prefix}`"
  - match: "*_vintage_unit_variable_opex"
    unit: "€/MJ"
