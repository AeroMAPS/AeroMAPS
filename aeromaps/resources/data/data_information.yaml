  - match: "*_total_consumption"
    unit: "MJ"
    description: "Total consumption of the resource by `{prefix}`"
  - match: "*_total_mobilised_with_selectivity"
    unit: "MJ"
    description: "Total resource mobilised by `{prefix}`, accounting for selectivity"
  - match: "*_plant_building_scenario"
    unit: "MJ/yr"
    description: "New annual production capacity of `{prefix}` plants built in the given year"
  - match: "*_plant_operating_capacity"
    unit: "MJ/yr"
    description: "Operating production capacity of `{prefix}` plants in the given year"
