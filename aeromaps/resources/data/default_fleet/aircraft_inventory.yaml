# =============================================================================
# AeroMAPS — Aircraft inventory (bottom-up fleet model)
# =============================================================================
# Referenced from the entry config as:
#   models.fleet.aircraft_inventory_model_data_file
# Defines every aircraft ID used by fleet.yaml. Two top-level lists:
#
#   reference_aircraft : in-service baselines (the "old"/"recent" refs that each
#                        subcategory benchmarks against). Their performance is
#                        given in ABSOLUTE terms (e.g. energy_per_ask in MJ/ASK).
#   aircraft           : future aircraft. Their performance is given RELATIVE to
#                        a reference aircraft, as *_evolution percentages.
#
# Absolute fields (reference_aircraft):
#   energy_per_ask        energy consumption per seat-km [MJ/ASK]
#   emission_index_nox    NOx emission index [kg/ASK]
#   emission_index_soot   soot emission index [kg/ASK]
#   doc_non_energy_base   base non-energy direct operating cost [€/ASK]
#   entry_into_service_year [yr]   cruise_altitude [m]   ask_year [ASK/yr]
#   rc_cost  recurring (per-unit) cost [€]   nrc_cost  development cost [€]
#   oew      operational empty weight [t]
#
# Relative fields (aircraft) — % change vs the linked reference_aircraft:
#   consumption_evolution, nox_evolution, soot_evolution, doc_non_energy_evolution
#   hybridization_factor  0 (conventional) .. 1 (fully electric) [-]
#   energy_type           DROP_IN_FUEL | HYDROGEN | ELECTRIC | HYBRID_ELECTRIC
#   (entry_into_service_year, cruise_altitude, ask_year, rc_cost, nrc_cost, oew
#    keep the same meaning/units as above)
#
# See docs/books/configuration.md for the full reference.
# =============================================================================

