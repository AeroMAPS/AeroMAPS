waste_residue_lipids_biomass:
  #ID
  name: "waste_residue_lipids_biomass"
  origin: "biomass"
  specifications:
    availability:
      global: 62.5e+12 # [MJ]
      # Crossing figures in Fueling Net Zero p. 33 and 41) -> 10 EJ / yr excluding oil and cellulosic crops
      # 2.5 EJ per year (equal shares waste, msw, wood, ar) for 25 years
      aviation_allocated_share: 5 # [%] Share of the global availability

