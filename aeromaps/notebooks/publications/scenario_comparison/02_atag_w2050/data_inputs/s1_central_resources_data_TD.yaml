renewables:
  # ID
  name: "renewables"
  origin: "electricity"
  specifications:
  # Technical:
    co2_emission_factor: !AeroMapsCustomDataType
        years: [ ]
        values: [ 15.7 ]
        method: linear
    availability:
#      global: 250.0e+12 # [EJ]
      aviation_allocated_share: 5 # [%] Share of the global availability
    cost: !AeroMapsCustomDataType
      years: [ 2020, 2050 ]
      values: [ 57.5/3600, 25/3600 ] # $ / MWh : 3600 MJ / MWh
      method: linear

co2_dac:
  #ID
  name: "co2_dac"
  specifications:
    #Economical
    cost: !AeroMapsCustomDataType
      years: [2020, 2050]
      values: [400e-3, 100e-3] # $ / ton CO2 : 1000 kg / ton
      method: linear

green_hydrogen:
  # ID
  name: "green_hydrogen"
  origin: "biomass"
  specifications:
    # Availability
    availability:
#      global: 164.0e+12 # [MJ]
      aviation_allocated_share: 5 # [%] Share of the global availability
    cost: !AeroMapsCustomDataType
      years: [ 2020, 2050 ]
      values: [ 5.9/120, 1.55/120 ] # $ / kg : 120 MJ / kg
      method: linear