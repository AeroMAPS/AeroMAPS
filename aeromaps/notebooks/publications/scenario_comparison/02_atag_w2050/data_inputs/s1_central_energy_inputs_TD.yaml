hefa_waste_residue_lipids:
  # Metadata
  name: "hefa_waste_residue_lipids"
  environmental_model: "top-down"
  cost_model: "top-down"
  aircraft_type: "dropin_fuel"
  energy_origin: "biomass"
  default: False
  abatement_cost: True
  compute_all_years: True
  # Until level two used to separate inputs. Then concatenated in variable name.
  inputs:
    # Policy
    mandate:
      mandate_type: "quantity"
      mandate_quantity: !AeroMapsCustomDataType
        years: [ 2020, 2025, 2030, 2035, 2040, 2045, 2050 ]
        values: [
          0.0 / 44e-9,
          3.12010697934728 / 44e-9,
          4.68017534693549 / 44e-9,
          5.46022440864419 / 44e-9,
          9.75039010263987 / 44e-9,
          12.8704970819871 / 44e-9,
          12.8704970819871 / 44e-9,
        ] # M ton = 1e6 ton * (1e3 kg/ton) / (44 MJ / kg)
        # half of HEFA production capacity from Figure Sources of sustainable aviation fuel (p.79)
        method: linear
    # Technical:
    technical:
      resource_names: [ "waste_residue_lipids_biomass" ]
      eis_resource_specific_consumption:
        hefa_fog_biomass: 1.14
      kerosene_selectivity: 0.15
      lhv: 44
      eis_plant_load_factor: 0.95
      eis_plant_lifespan: 25
    # Environmental:
    environmental:
      eis_co2_emission_factor_without_resource: !AeroMapsCustomDataType
        years: []
        values: [20.7]
        method: linear
      emission_index:
        h2o: 1.231
        nox: 0.01514
        sulfur: 0.0
        soot: 6.0e-06
        particles_number: 8.0e+13
    # Economics:
    economics:
      mean_mfsp_without_resource: !AeroMapsCustomDataType
        years: [ 2025, 2030, 2040, 2050 ]
        values: [
          1312.9497077457102 / 44.0e3,
          1300.9590258525777 / 44.0e3,
          1288.9688013571904 / 44.0e3,
          1282.9736891094965 / 44.0e3,
        ]
        # US$ / ton / (1000 kg / ton * 44 MJ / kg) -> US$ / MJ
        method: linear
  outputs:


