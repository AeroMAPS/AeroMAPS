hefa_waste_residue_lipids:
  # Metadata
  name: "hefa_waste_residue_lipids"
  environmental_model: "top-down"
  cost_model: "top-down"
  aircraft_type: "dropin_fuel"
  energy_origin: "biomass"
  default: False
  compute_all_years: True
  # Until level two used to separate inputs. Then concatenated in variable name.
  inputs:
    # Policy
    mandate:
      mandate_type: "quantity"
      mandate_quantity: !AeroMapsCustomDataType
        years: [ 2020, 2025, 2030, 2035, 2040, 2045, 2050 ]
        values: [0.0, 137284707091.28032, 205927715265.16156, 240249873980.34436, 429017164516.15424, 566301871607.4324, 566301871607.4324]
        #  0.0 * 44.0e9,
        #  3.12010697934728 * 44.0e9,
        #  4.68017534693549 * 44.0e9,
        #  5.46022440864419 * 44.0e9,
        #  9.75039010263987 * 44.0e9,
        #  12.8704970819871 * 44.0e9,
        #  12.8704970819871 * 44.0e9,
        # M ton = 1e6 ton * (1e3 kg/ton) * (44 MJ / kg)
        # half of HEFA production capacity from Figure Sources of sustainable aviation fuel (p.79)
        method: linear
    # Technical:
    technical:
      resource_names: [ "waste_residue_lipids_biomass" ]
      resource_specific_consumption:
        waste_residue_lipids_biomass: 1.14
      kerosene_selectivity: 0.15
      lhv: 44
      plant_load_factor: 0.95
      plant_lifespan: 25
    # Environmental:
    environmental:
      co2_emission_factor_without_resource: !AeroMapsCustomDataType
        years: []
        values: [15.498]
        method: linear
      emission_index:
        h2o: 1.231
        nox: 0.01514
        sulfur: 0.0
        soot: 6.0e-06
        particles_number: 8.0e+13
    # Economics:
    economics:
      mean_mfsp_without_resource: !AeroMapsCustomDataType
        years: [ 2025, 2030, 2040, 2050 ]
        values: [ 0.02536380117236031, 0.0251321629994248, 0.024900533662582085, 0.02478471899416073]
        # 1312.9497077457102 * 0.85 / 44.0e3,
        # 1300.9590258525777 * 0.85 / 44.0e3,
        # 1288.9688013571904 * 0.85 / 44.0e3,
        # 1282.9736891094965 * 0.85 / 44.0e3,
        # US$ / ton * (0.85 € / US$ on 06/01/2026) / (1000 kg / ton * 44 MJ / kg) -> € / MJ
        method: linear
  outputs:


