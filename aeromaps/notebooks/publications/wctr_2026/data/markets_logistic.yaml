# WCTR 2026 — logistic-income / price demand markets.
# Used by: configs/config_logistic_fossil.yaml
#          configs/config_logistic_saf.yaml
#          configs/config_logistic_price_2019.yaml
#          configs/config_logistic_price_min.yaml
#          configs/config_logistic_price_max.yaml
#
# The RPK trajectory is set by the logistic-income demand model (logistic
# income trend x price index), fed by the socioeconomic_drivers custom model,
# so no exogenous CAGR growth is needed (the growth / reference blocks below
# keep the generic placeholder used by the reference discipline only).
# What is migrated out of data/inputs_2070.json and data/inputs_2100.json here
# is the drop-in efficiency gain curve and the end-year load factor.

global:
  # RPKLogisticIncomePriceElasticity: logistic income trend x price index.
  demand:
    model: logistic_income

defaults:
  passenger:
    inputs:
      growth:
        cagr_reference_periods: []
        cagr_reference_periods_values: [3.0]
      covid:
        covid_drop_start_year: 66.0
        covid_end_year: 2024
        covid_end_year_reference_ratio: 100.0
      load_factor:
        load_factor_end_year: 82.399312
        covid_load_factor_2020: 65.2
      measures:
        measures_final_impact: 0.0
        measures_start_year: 2051
        measures_duration: 5.0
      efficiency_simple:
        energy_per_ask_dropin_fuel_gain_reference_years: [2020, 2021, 2022, 2023, 2024, 2025, 2026, 2027, 2028, 2029, 2030, 2031, 2032, 2033, 2034, 2035, 2036, 2037, 2038, 2039, 2040, 2041, 2042, 2043, 2044, 2045, 2046, 2047, 2048, 2049, 2050, 2051, 2052, 2053, 2054, 2055, 2056, 2057, 2058, 2059, 2060, 2061, 2062, 2063, 2064, 2065, 2066, 2067, 2068, 2069, 2070]
        energy_per_ask_dropin_fuel_gain_reference_years_values: [4.15, 0.81, 0.98, 0.99, 0.83, 0.67, 1.01, 0.85, 0.86, 1.04, 0.88, 0.88, 0.89, 0.9, 0.73, 0.91, 0.92, 0.75, 0.75, 0.95, 0.77, 1.34, 1.36, 1.38, 1.6, 1.22, 1.65, 1.46, 1.7, 1.51, 1.53, 0.67, 0.9, 0.91, 0.69, 0.92, 0.93, 0.71, 0.95, 0.72, 1.2, 0.25, 0.5, 0.5, 0.5, 0.75, 0.51, 0.76, 0.26, 0.51, 0.52]
        hydrogen_final_market_share: 0.0
        hydrogen_introduction_year: 2051
        electric_final_market_share: 0.0
        electric_introduction_year: 2051
        relative_energy_per_ask_hydrogen_wrt_dropin_reference_years: []
        relative_energy_per_ask_hydrogen_wrt_dropin_reference_years_values: [1.0]
        relative_energy_per_ask_electric_wrt_dropin_reference_years: []
        relative_energy_per_ask_electric_wrt_dropin_reference_years_values: [1.0]
      costs:
        doc_non_energy_per_ask_dropin_fuel_gain: 0.0
        relative_doc_non_energy_per_ask_hydrogen_wrt_dropin: 1.1
        relative_doc_non_energy_per_ask_electric_wrt_dropin: 1.0
      reference:
        reference_cagr_reference_periods: []
        reference_cagr_reference_periods_values: [3.0]
  freight:
    inputs:
      growth:
        cagr_reference_periods: []
        cagr_reference_periods_values: [3.0]
      covid:
        covid_drop_start_year: 66.0
        covid_end_year: 2022
        covid_end_year_reference_ratio: 100.0
      reference:
        reference_cagr_reference_periods: []
        reference_cagr_reference_periods_values: [3.0]

short_range:
  name: "Short Range"
  traffic_type: passenger
  traffic_unit: RPK
  inputs:
    initial:
      rpk_share_last_historical_year: 27.2
      energy_share_last_historical_year: 26.01
    costs:
      doc_non_energy_per_ask_dropin_fuel_init: 0.048375

medium_range:
  name: "Medium Range"
  traffic_type: passenger
  traffic_unit: RPK
  inputs:
    initial:
      rpk_share_last_historical_year: 35.1
      energy_share_last_historical_year: 26.18
    costs:
      doc_non_energy_per_ask_dropin_fuel_init: 0.0301

long_range:
  name: "Long Range"
  traffic_type: passenger
  traffic_unit: RPK
  inputs:
    initial:
      rpk_share_last_historical_year: 37.7
      energy_share_last_historical_year: 32.81
    costs:
      doc_non_energy_per_ask_dropin_fuel_init: 0.024725

freight:
  name: "Freight"
  traffic_type: freight
  traffic_unit: RTK
  inputs:
    initial:
      rtk_share_last_historical_year: 100.0
      energy_share_last_historical_year: 15.0
