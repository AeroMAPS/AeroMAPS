data:
  inputs:
    json_inputs_file: "../../ltag_data_inputs/is2medium_inputs.json"
    partitioning_data_file: "../../partitioning_data/partitioning_updated_inputs.json"
  outputs:
    json_outputs_file: "../../ltag_data_outputs/is2medium_outputs.json"

models:
  climate:
    climate_model_data_file: default

  energy:
    energy_carriers_model_data_file: "../../ltag_data_inputs/is2_medium_energy_inputs.yaml"
    resources_model_data_file: "../../ltag_data_inputs/is2_resources_data.yaml"
    
  life_cycle_assessment:
    lca_model_data_file: "../../lca_data/lca_model_ecats_optim.json"
    split_by: 'phase'
    methods:
        - "('PBLCIA', 'climate change', 'climate change radiative forcing')"
        - "('PBLCIA', 'biosphere integrity', 'biosphere integrity')"
    

  standards:
    - models_traffic
    - models_efficiency_top_down_interp
    - models_energy_with_fuel_effect
    - models_offset
    - models_emissions
    - models_sustainability
    - carbon_tax