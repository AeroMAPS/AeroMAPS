# ============================================================================
# Multi-Regional AeroMAPS Configuration - All Regions (Simple)
# ============================================================================
# This configuration runs all available regions using default AeroMAPS settings.
# Uses separate_processes mode for sequential/parallel execution.
# ============================================================================

regionalisation:
  execution_mode: "separate_processes"
  global_namespace: "overall"

  # --------------------------------------------------------------------------
  # Top-level models (optional)
  # --------------------------------------------------------------------------
  # Models that run on the aggregated (global-namespace) data, AFTER the regional
  # processes and the aggregator. They consume the aggregator's "overall:*" outputs
  # and produce further "overall:*" outputs, coupling by variable name. Use the same
  # "standards"/"customs" structure as a regional models block.
  # NOTE: a region's own model selection lives in its config_file; that is unrelated
  # to this top-level block. Only standard models that couple purely within the global
  # namespace are supported here (no climate historical data / pathways / fleet yet).
  # top_level_models:
  #   standards:
  #     - <model_group_name>
  #   customs:
  #     my_global_model: "path/to/model.py::MyGlobalModel"

  regions:
    # Africa Domestic
    AF_DOM:
      config_file: "data/region_af_dom/config.yaml"
    
    # Africa International
    AF_INT:
      config_file: "data/region_af_int/config.yaml"
    
    # Asia Domestic
    AS_DOM:
      config_file: "data/region_as_dom/config.yaml"
    
    # Brazil Domestic
    BRAS_DOM:
      config_file: "data/region_bras_dom/config.yaml"
    
    # EU Domestic
    EU_DOM:
      config_file: "data/region_eu_dom/config.yaml"
    
    # EU International
    EU_INT:
      config_file: "data/region_eu_int/config.yaml"
    
    # Oceania Domestic
    OC_DOM:
      config_file: "data/region_oc_dom/config.yaml"
    
    # Oceania International
    OC_INT:
      config_file: "data/region_oc_int/config.yaml"
    
    # Other Asia International
    OTHER_AS_INT:
      config_file: "data/region_other_as_int/config.yaml"
    
    # Other Europe Domestic
    OTHER_EUR_DOM:
      config_file: "data/region_other_eur_dom/config.yaml"
    
    # Other Europe International
    OTHER_EUR_INT:
      config_file: "data/region_other_eur_int/config.yaml"
    
    # Other North America Domestic
    OTHER_NAM_DOM:
      config_file: "data/region_other_nam_dom/config.yaml"
    
    # Other North America International
    OTHER_NAM_INT:
      config_file: "data/region_other_nam_int/config.yaml"
    
    # Other South America Domestic
    OTHER_SAM_DOM:
      config_file: "data/region_other_sam_dom/config.yaml"
    
    # Singapore International
    SIN_INT:
      config_file: "data/region_sin_int/config.yaml"
    
    # UK Domestic
    UK_DOM:
      config_file: "data/region_uk_dom/config.yaml"
    
    # UK International
    UK_INT:
      config_file: "data/region_uk_int/config.yaml"
    
    # USA Domestic
    USA_DOM:
      config_file: "data/region_usa_dom/config.yaml"
    
    # USA International
    USA_INT:
      config_file: "data/region_usa_int/config.yaml"
    
    # South America International
    SAM_INT:
      config_file: "data/region_sam_int/config.yaml"

  # --------------------------------------------------------------------------
  # Aggregation Rules
  # --------------------------------------------------------------------------
  aggregation:
    sum:
      - co2_emissions_including_energy
      - co2_emissions_including_aircraft_efficiency
      - co2_emissions_including_operations
      - co2_emissions_including_load_factor
      - co2_emissions_2019technology
      - cumulative_co2_emissions
      - cumulative_co2_emissions_including_aircraft_efficiency
      - cumulative_co2_emissions_including_operations
      - cumulative_co2_emissions_including_load_factor
      - cumulative_co2_emissions_2019technology
      - cumulative_carbon_offset
      - biomass_total_consumption
      - carbon_offset
      - rpk
      - ask
      #- energy_consumption
      #- energy_consumption_kerosene
      #- energy_consumption_biofuel
      #- energy_consumption_electrofuel
      #- energy_consumption_electricity
      #- energy_consumption_hydrogen

    weighted_average:
      - variable: load_factor
        weight_by: ask
      #- variable: energy_per_ask
      #  weight_by: ask
