# ============================================================================
# Multi-Regional AeroMAPS Configuration - Supertest (Exec Time Scaling)
# ============================================================================
# This configuration contains many region copies to benchmark how execution
# time scales with number of regions. All duplicated regions reuse the same
# underlying config_file (content is irrelevant for timing).
#
# The notebook subsets this file to N regions and times compute() for each N.
# ============================================================================

models:
  standards:
    - default_models_top_down

regionalisation:
  execution_mode: "separate_processes"
  global_namespace: "overall"

  regions:
