# ============================================================================
# Multi-Regional AeroMAPS Configuration
# ============================================================================
#
# This is the main configuration file for running multi-regional AeroMAPS
# scenarios. It specifies:
# - Standard AeroMAPS models to use (shared across all regions)
# - Region definitions with their specific config files
# - Aggregation rules for computing global metrics from regional outputs
#
# The presence of the 'regionalisation' section triggers multi-regional mode.
# ============================================================================

# ----------------------------------------------------------------------------
# Standard Models Configuration
# ----------------------------------------------------------------------------
# Models specified here will be used for all regions (unless overridden in
# regional config files).
# ----------------------------------------------------------------------------

models:
  standards:
    - default_models_top_down

# ----------------------------------------------------------------------------
# Regionalisation Configuration
# ----------------------------------------------------------------------------
# This section triggers multi-regional mode when present.
# ----------------------------------------------------------------------------

regionalisation:
  # --------------------------------------------------------------------------
  # Execution Mode
  # --------------------------------------------------------------------------
  # Choose how regional processes are executed:
  # - "separate_processes" (default): Each region executed independently.
  #   More scalable, allows parallel execution with compute(parallel=True).
  # - "unified_mda": All regional disciplines in a single MDAChain.
  #   Useful when regions have coupling, but memory-intensive.
  # --------------------------------------------------------------------------
  execution_mode: "separate_processes"
  
  global_namespace: "overall"

  # --------------------------------------------------------------------------
  # Region Definitions
  # --------------------------------------------------------------------------
  # Each region must specify a config_file pointing to a standard AeroMAPS
  # configuration file for that region.
  #
  # The region ID (e.g., "FR", "DE") will be used as the namespace prefix
  # for all I/O variables from that region.
  # --------------------------------------------------------------------------

  regions:
    FR:
      config_file: "data/region_france/config.yaml"
      # Optional: Additional region-specific metadata
      # name: "France"
      # description: "French domestic and international aviation"
