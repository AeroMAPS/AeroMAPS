      # description: "German domestic and international aviation"

  # --------------------------------------------------------------------------
  # Aggregation Rules
  # --------------------------------------------------------------------------
  # Specify how regional outputs should be aggregated into global metrics.
  #
  # Supported aggregation methods:
  # - sum: Linear sum of regional values (for extensive quantities)
  # - weighted_average: Weighted average (for intensive quantities)
  #
  # For weighted_average, specify:
  # - variable: The variable to aggregate
  # - weight_by: The variable to use as weights
  # --------------------------------------------------------------------------

  aggregation:
    # Extensive quantities: aggregate by sum
    sum:
      - co2_emissions_including_energy
      - rpk

    # Intensive quantities: aggregate by weighted average
    # (weighted by RPK for passenger-related metrics)
    weighted_average:
      - variable: load_factor
        weight_by: rpk
      # - variable: emission_factor_per_rpk
      #   weight_by: rpk
