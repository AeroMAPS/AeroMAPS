# ============================================================================
# Multi-Regional AeroMAPS Main Configuration
# ============================================================================
#
# This is the main configuration file for running multi-regional AeroMAPS
# scenarios. It references a regionalisation configuration file that defines
# the regions and aggregation rules.
#
# ============================================================================

# Reference the default models (only needed for parameter initialization)
models:
  standards:
    - default_models_top_down

# Regionalisation configuration
# Presence of this section triggers multi-regional mode
regionalisation:
  regionalisation_file: "regionalisation.yaml"
