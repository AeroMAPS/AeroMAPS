# ============================================================================
# Multi-Regional AeroMAPS Configuration - Europe (Tutorial)
# ============================================================================
# Two-region example: EU Domestic and EU International.
# This variant runs in "unified_mda" mode (all regional disciplines solved in a
# single MDAChain). It is identical to regionalisation_europe_separate_processes.yaml
# except for `execution_mode`, so the tutorial can run both and check they agree.
# ============================================================================

regionalisation:
  execution_mode: "unified_mda"
  global_namespace: "overall"
  # Optional: add models that run on aggregated global data under `top_level_models`
  # (same standards/customs structure as a regional models block). See the docstring
  # of MultiRegionalProcess._load_top_level_models for details.

  regions:
    EU_DOM:
      config_file: "data/region_eu_dom/config.yaml"

    EU_INT:
      config_file: "data/region_eu_int/config.yaml"

  aggregation:
    sum:
      - co2_emissions_including_energy
      - co2_emissions_including_aircraft_efficiency
      - co2_emissions_including_load_factor
      - co2_emissions_last_historical_year_technology
      - cumulative_co2_emissions
      - cumulative_co2_emissions_including_aircraft_efficiency
      - cumulative_co2_emissions_including_load_factor
      - cumulative_co2_emissions_last_historical_year_technology
      - cumulative_carbon_offset
      - carbon_offset
      - rpk
      - ask

    weighted_average:
      - variable: load_factor
        weight_by: ask
