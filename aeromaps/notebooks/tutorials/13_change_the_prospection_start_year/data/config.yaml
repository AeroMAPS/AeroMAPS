# Configuration for a scenario whose prospection starts in 2025 (instead of the
# default 2020). The only model-side change vs the basic tutorial is the
# json_inputs_file that carries the new prospection_start_year and the extended
# 2000-2024 historic vectors. Markets / climate / energy use the defaults.
data:
  inputs:
    json_inputs_file: "./inputs_2025.json"
models:
  markets:
    markets_data_file: default
  climate:
    climate_model_data_file: default
  energy:
    energy_carriers_model_data_file: default
    resources_model_data_file: default
    processes_model_data_file: default
  standards:
    - models_traffic
    - models_efficiency_top_down
    - models_energy_without_fuel_effect
    - models_offset
    - models_emissions
    - models_sustainability
    - models_energy_cost
    - models_operation_cost_top_down
