# Custom market definitions for Phase 3 smoke test.
# Uses 2 passenger markets instead of the default 3, plus 1 freight market.
#
#   regional        — combines short + medium haul (62.3 % of RPK)
#   intercontinental — long-haul only              (37.7 % of RPK)
#   air_cargo       — all-freighter ops            (15 %  of energy)
#
# rpk_share_last_historical_year  must sum to 100 across passenger markets : 62.3 + 37.7 = 100 ✓
# energy_share_last_historical_year must sum to 85  across passenger markets : 52.19 + 32.81 = 85 ✓
# freight energy_share_last_historical_year = 15.0 → grand total = 100 ✓

defaults:
  passenger:
    inputs:
      growth:
        cagr_reference_periods: []
        cagr_reference_periods_values: [3.0]
      covid:
        covid_drop_start_year: 66.0
        covid_end_year: 2024
        covid_end_year_reference_ratio: 100.0
      load_factor:
        load_factor_end_year: 85.0
        covid_load_factor_2020: 65.2
      measures:
        measures_final_impact: 0.0
        measures_start_year: 2051
        measures_duration: 5.0
      efficiency_simple:
        energy_per_ask_dropin_fuel_gain_reference_years: []
        energy_per_ask_dropin_fuel_gain_reference_years_values: [2.0]
        hydrogen_final_market_share: 0.0
        hydrogen_introduction_year: 2051
        electric_final_market_share: 0.0
        electric_introduction_year: 2051
        relative_energy_per_ask_hydrogen_wrt_dropin_reference_years: []
        relative_energy_per_ask_hydrogen_wrt_dropin_reference_years_values: [1.0]
        relative_energy_per_ask_electric_wrt_dropin_reference_years: []
        relative_energy_per_ask_electric_wrt_dropin_reference_years_values: [1.0]
      costs:
        doc_non_energy_per_ask_dropin_fuel_gain: 0.0
        relative_doc_non_energy_per_ask_hydrogen_wrt_dropin: 1.1
        relative_doc_non_energy_per_ask_electric_wrt_dropin: 1.0
      reference:
        reference_cagr_reference_periods: []
        reference_cagr_reference_periods_values: [3.0]
  freight:
    inputs:
      growth:
        cagr_reference_periods: []
        cagr_reference_periods_values: [3.0]
      covid:
        covid_drop_start_year: 66.0
        covid_end_year: 2024
        covid_end_year_reference_ratio: 100.0
      reference:
        reference_cagr_reference_periods: []
        reference_cagr_reference_periods_values: [3.0]

regional:
  name: "Regional"
  traffic_type: passenger
  traffic_unit: RPK
  inputs:
    initial:
      rpk_share_last_historical_year: 62.3      # short_range (27.2) + medium_range (35.1)
      energy_share_last_historical_year: 52.19  # short_range (26.01) + medium_range (26.18)
    costs:
      doc_non_energy_per_ask_dropin_fuel_init: 0.038  # weighted avg of SR 0.048375 and MR 0.0301

intercontinental:
  name: "Intercontinental"
  traffic_type: passenger
  traffic_unit: RPK
  inputs:
    initial:
      rpk_share_last_historical_year: 37.7      # same as default long_range
      energy_share_last_historical_year: 32.81  # same as default long_range
    costs:
      doc_non_energy_per_ask_dropin_fuel_init: 0.024725  # same as default long_range

air_cargo:
  name: "Air Cargo"
  traffic_type: freight
  traffic_unit: RTK
  inputs:
    initial:
      rtk_share_last_historical_year: 100.0
      energy_share_last_historical_year: 15.0
