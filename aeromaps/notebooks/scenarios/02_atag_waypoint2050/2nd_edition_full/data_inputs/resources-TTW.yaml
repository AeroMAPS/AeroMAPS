green_electricity:
  # ID
  name: "green_electricity"
  origin: "electricity"
  specifications:
  # Technical:
    co2_emission_factor: !AeroMapsCustomDataType
      years: [ ]
      values: [ 0.0 ]
      method: linear
    availability:
      global: 224.1e+12 # [EJ]
      # based on IEA NZE scenario (p. 87)
      aviation_allocated_share: 5 # [%] Share of the global availability
    cost: !AeroMapsCustomDataType
      years: [ 2020, 2050 ]
      values: [ 0.01597222222222222, 0.006944444444444444 ] # $ / MWh : 3600 MJ / MWh
      method: linear

co2_dac:
  #ID
  name: "co2_dac"
  specifications:
    #Economical
    cost: !AeroMapsCustomDataType
      years: [2020, 2050]
      values: [0.4, 0.1] # $ / ton CO2 : 1000 kg / ton
      method: linear


transport:
  # Metadata
  name: "transport"
  specifications:
    cost: !AeroMapsCustomDataType
      years: []
      values: [0.003]
      method: linear
