# Fleet model for ATAG W2050 S1 scenario
# 26% electric short-range by 2040
# Conventional aircraft for medium and long range

subcategories:
  # Short Range - Conventional narrow-body (74% of SR = 54.76% total)
  - id: sr_conventional_nb
    name: "SR conventional narrow-body"
    share: 54.76  # 74% of short-range traffic
    reference_aircraft:
      old_ref: sr_conventional_nb_old
      recent_ref: sr_conventional_nb_recent
    aircraft:
      - sr_nb_2035
      - sr_nb_2045

  # Short Range - Regional turboprop (remaining conventional SR)
  - id: sr_regional_tp
    name: "SR regional turboprop"
    share: 19.24  # Remaining conventional short-range
    reference_aircraft:
      old_ref: sr_regional_tp_old
      recent_ref: sr_regional_tp_recent
    aircraft:
      - sr_tp_2030
      - sr_tp_2045

  # Short Range - Electric (26% of SR from 2040)
  - id: sr_electric
    name: "SR electric narrow-body"
    share: 26.0  # 26% of short-range traffic
    reference_aircraft:
      old_ref: sr_conventional_nb_old
      recent_ref: sr_conventional_nb_recent
    aircraft:
      - sr_electric_2040
      - sr_electric_2050

  # Medium Range - Conventional narrow-body (100%)
  - id: mr_conventional_nb
    name: "MR conventional narrow-body"
    share: 100.0
    reference_aircraft:
      old_ref: mr_conventional_nb_old
      recent_ref: mr_conventional_nb_recent
    aircraft:
      - mr_nb_2035
      - mr_nb_2045

  # Long Range - Conventional wide-body (100%)
  - id: lr_conventional_wb
    name: "LR conventional wide-body"
    share: 100.0
    reference_aircraft:
      old_ref: lr_conventional_wb_old
      recent_ref: lr_conventional_wb_recent
    aircraft:
      - lr_wb_2035
      - lr_wb_2045


categories:
  - id: short_range
    name: "Short Range"
    parameters:
      life: 25
      limit: 2
    subcategories:
      - sr_conventional_nb
      - sr_regional_tp
      - sr_electric

  - id: medium_range
    name: "Medium Range"
    parameters:
      life: 25
      limit: 2
    subcategories:
      - mr_conventional_nb

  - id: long_range
    name: "Long Range"
    parameters:
      life: 25
      limit: 2
    subcategories:
      - lr_conventional_wb
