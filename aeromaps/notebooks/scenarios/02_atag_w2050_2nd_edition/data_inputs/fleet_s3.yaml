# Fleet model for ATAG W2050 S3 scenario
# 26% electric short-range by 2040
# 100% hydrogen medium-range by 2035

subcategories:
  # Short Range - Conventional narrow-body (74% share)
  - id: sr_conventional_nb
    name: "SR conventional narrow-body"
    share: 54.0  # 74% of short-range
    reference_aircraft:
      old_ref: sr_conventional_nb_old
      recent_ref: sr_conventional_nb_recent
    aircraft:
      - sr_nb_2035
      - sr_nb_2045

  # Short Range - Regional turboprop (still conventional)
  - id: sr_regional_tp
    name: "SR regional turboprop"
    share: 19.0  # Remaining conventional short-range
    reference_aircraft:
      old_ref: sr_regional_tp_old
      recent_ref: sr_regional_tp_recent
    aircraft:
      - sr_tp_2030
      - sr_tp_2045

  # Short Range - Electric (26% share from 2040)
  - id: sr_electric
    name: "SR electric narrow-body"
    share: 26.0  # 26% of short-range
    reference_aircraft:
      old_ref: sr_conventional_nb_old
      recent_ref: sr_conventional_nb_recent
    aircraft:
      - sr_electric_2040
      - sr_electric_2050

  # Medium Range - Hydrogen (100% from 2035)
  - id: mr_hydrogen_nb
    name: "MR hydrogen narrow-body"
    share: 100.0
    reference_aircraft:
      old_ref: mr_conventional_nb_old
      recent_ref: mr_conventional_nb_recent
    aircraft:
      - mr_hydrogen_2035
      - mr_hydrogen_2045

  # Long Range - Conventional wide-body (100%)
  - id: lr_conventional_wb
    name: "LR conventional wide-body"
    share: 100.0
    reference_aircraft:
      old_ref: lr_conventional_wb_old
      recent_ref: lr_conventional_wb_recent
    aircraft:
      - lr_wb_2035
      - lr_wb_2045


categories:
  - id: short_range
    name: "Short Range"
    parameters:
      life: 25
      limit: 2
    subcategories:
      - sr_conventional_nb
      - sr_regional_tp
      - sr_electric

  - id: medium_range
    name: "Medium Range"
    parameters:
      life: 25
      limit: 2
    subcategories:
      - mr_hydrogen_nb

  - id: long_range
    name: "Long Range"
    parameters:
      life: 25
      limit: 2
    subcategories:
      - lr_conventional_wb
