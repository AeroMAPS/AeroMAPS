# Push-fleet-model demo scenario. Pivots on 2024 (prospection_start_year = 2025),
# which the push engine REQUIRES (it is calibrated to the end-2024 fleet). The
# historic 2000-2024 *_init vectors come from inputs_2025.json (the same ad-hoc
# 2020-2024 extension used by tutorials/13_change_the_prospection_start_year).
data:
  inputs:
    json_inputs_file: "./inputs_2025.json"          # relative to this config's dir
models:
  markets:
    # Paco's TP/RJ/NB/WB segments as passenger markets — this scenario's markets file
    # lives next to the notebook (like tutorials/05's fleet.yaml), resolved relative
    # to this config's dir.
    markets_data_file: "./markets_push.yaml"
  # Push engine input files (parallel to models.fleet for the bottom-up FleetModel).
  # `default` resolves to the shipped resource; or give a path relative to this dir to
  # override a file. Selecting the push engine itself is done via models.standards
  # (models_efficiency_push) below; omitting this whole block also falls back to the
  # shipped defaults.
  fleet_push:
    classification_data_file: default
    market_param_data_file: default
    in_production_inventory_file: default
    new_aircraft_inventory_file: default
    aircraft_parameters_file: default
    fleet_snapshot_file: default
  climate:
    climate_model_data_file: default
  energy:
    energy_carriers_model_data_file: default
    resources_model_data_file: default
    processes_model_data_file: default
  standards:
    - models_traffic
    - models_efficiency_push          # <- push fleet engine (drop-in efficiency bridge)
    - models_energy_without_fuel_effect
    - models_offset
    - models_emissions
    - models_sustainability
    - models_energy_cost
    - models_operation_cost_top_down
