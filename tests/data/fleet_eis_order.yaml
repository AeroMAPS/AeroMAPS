# Fleet configuration with aircraft listed in correct EIS order (2035 → 2045).
# This is the expected YAML layout — newer aircraft follow older ones.

subcategories:
  - id: sr_conventional_nb
    name: "SR conventional narrow-body"
    share: 100.0
    reference_aircraft:
      old_ref: sr_nb_old
      recent_ref: sr_nb_recent
    aircraft:
      - sr_nb_2035   # EIS 2035 — listed first (correct)
      - sr_nb_2045   # EIS 2045 — listed second (correct)

categories:
  - market_served: short_range
    parameters:
      life: 25
      limit: 2
    subcategories:
      - sr_conventional_nb
